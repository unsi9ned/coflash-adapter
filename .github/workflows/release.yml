name: 'Build and Release'

# ВРЕМЕННО: Запускать workflow только из ветки ci/debug-workflow
on:
  workflow_dispatch: # Оставляем для ручного запуска из интерфейса GitHub
  
#on:
#  push:
#    tags:
#      - 'v*'  # Workflow запускается при создании тега, например, v0.1.0

permissions:
  contents: write  # Нужно для создания релиза

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MinGW
        run: |
          choco install mingw --version=10.3.0 -y
          echo "C:\tools\mingw64\bin" >> $GITHUB_PATH
      
      - name: Build
        run: make
      
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: coflash-adapter
          path: coflash.exe
          retention-days: 1

  release:
    needs: build  # Дожидается успешного завершения задачи 'build'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: coflash-adapter

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: coflash.exe
          name: "coflash-adapter-${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true